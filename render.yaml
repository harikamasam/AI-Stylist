services:
  - type: web
    name: aistylist-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: BACKEND_CORS_ORIGINS
        value: https://aistylist.in,https://www.aistylist.in
