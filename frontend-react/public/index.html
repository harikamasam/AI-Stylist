<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#070706" />
    <meta
      name="description"
      content="AI Stylist is a premium AI fashion intelligence platform for real-time try-on, recommendations, analytics, and saved outfits."
    />
    <meta property="og:title" content="AI Stylist" />
    <meta
      property="og:description"
      content="See your style before you buy with AI-powered fashion intelligence."
    />
    <meta property="og:url" content="https://aistylist.in" />
    <meta property="og:type" content="website" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>AI Stylist | See your style before you buy</title>
    <style>
      body {
        background: #070706;
      }

      .app-loading {
        align-items: center;
        background:
          radial-gradient(circle at 30% 20%, rgba(214, 194, 161, 0.14), transparent 28%),
          linear-gradient(135deg, #070706, #11100e);
        color: #f5f1e8;
        display: flex;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        inset: 0;
        justify-content: center;
        min-height: 100vh;
      }

      .app-loading-card {
        border: 1px solid rgba(245, 241, 232, 0.12);
        border-radius: 28px;
        padding: 28px;
        text-align: center;
      }

      .app-loading-mark {
        align-items: center;
        background: #f5f1e8;
        border-radius: 18px;
        color: #070706;
        display: inline-flex;
        font-weight: 900;
        height: 44px;
        justify-content: center;
        width: 44px;
      }
    </style>
  </head>
  <body>
    <noscript>Enable JavaScript to run AI Stylist.</noscript>
    <div id="root">
      <div class="app-loading">
        <div class="app-loading-card">
          <div class="app-loading-mark">A</div>
          <h1>AI Stylist</h1>
          <p>Preparing your fashion intelligence workspace...</p>
        </div>
      </div>
    </div>
  </body>
</html>
